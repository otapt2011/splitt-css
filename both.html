            color: #b36b00;
        }

            height: auto !important;
            min-height: 140px;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            background: #ffffff !important;
            border: 1px solid #e2e8f0;
            padding: 2px 0;
            flex: 1;
        }
        .CodeMirror-scroll {
            min-height: 140px;
            padding: 4px 6px;
        }
        .cm-s-default .cm-property {
            color: #0b4f8a;
        }
        .cm-s-default .cm-keyword {
            color: #a626a4;
        }
        .cm-s-default .cm-operator {
            color: #a626a4;
        }
        .cm-s-default .cm-variable {
            color: #0b4f8a;
        }
        .cm-s-default .cm-builtin {
            color: #0b7e6b;
        }
        .cm-s-default .cm-tag {
            color: #a626a4;
        }

        .output-panel .CodeMirror {
            min-height: 100px;
            border: none;
            border-radius: 0;
            padding: 0;
            flex: 1;
        }
        .output-panel .CodeMirror-scroll {
            min-height: 100px;
            padding: 4px 6px;
        }
        .output-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
        }
        .output-panel .CodeMirror {
            flex: 1;
        }

        .compact-btn {
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 4px;
            transition: all 0.15s;
            cursor: pointer;
            border: none;
            background: #f1f5f9;
            color: #1e293b;
        }
        .compact-btn:hover {
            background: #e2e8f0;
        }
        .compact-btn-primary {
            background: #0f172a;
            color: white;
        }
        .compact-btn-primary:hover {
            background: #1e293b;
        }
        .compact-btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
        }
        .compact-btn-outline:hover {
            background: #f1f5f9;
        }
        .compact-btn-sm {
            padding: 2px 8px;
            font-size: 11px;
        }
        .icon-split {
            margin-right: 4px;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #fileInput {
            display: none;
        }

        @media (max-width: 640px) {
            .CodeMirror {
                font-size: 12px;
                min-height: 100px;
            }
            .CodeMirror-scroll {
                min-height: 100px;
            }
        }

        .size-label {
            font-size: 10px;
            color: #94a3b8;
            font-weight: normal;
            margin-left: 4px;
        }
        #part1Count,
        #part2Count,
        #part3Count,
        #part4Count {
            display: none !important;
        }
        .size-label {
            font-size: 8px !important;
        }

        .toggle-active {
            background: #0f172a !important;
            color: white !important;
            border-color: #0f172a !important;
        }
        .toggle-active:hover {
            background: #1e293b !important;
        }

        .output-panel.arriving {
            animation: fadeSlide 0.3s ease-out;
        }
        @keyframes fadeSlide {
            0% {
                opacity: 0.4;
                transform: translateY(6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

<body class="flex flex-col h-screen overflow-hidden">

                    Enter CSS

            </div>

    <script>
        // ================================================================
        // 1. PARSER
        // ================================================================
        function parseCSS(css) {
            if (css.indexOf(";!important") > -1) css = css.replace(/;!important/g, " !important");
            if (css.indexOf("; !important") > -1) css = css.replace(/; !important/g, " !important");

            function stylesheet() { return { stylesheet: { rules: rules() } }; }

            function open() { return match(/^{\s*/); }

            function close() { return match(/^}\s*/); }

            function rules() {
                var node, rules = [];
                whitespace();
                comments(rules);
                while (css[0] != '}' && (node = atrule() || rule())) {
                    comments(rules);
                    rules.push(node);
                }
                return rules;
            }

            function match(re) {
                var m = re.exec(css);
                if (!m) return;
                css = css.slice(m[0].length);
                return m;
            }

            function whitespace() { match(/^\s*/); }

            function comments(rules) {
                rules = rules || [];
                var c;
                while (c = comment()) { rules.push(c); }
                return rules;
            }

            function comment() {
                if ('/' == css[0] && '*' == css[1]) {
                    var i = 2;
                    while ('*' != css[i] || '/' != css[i + 1]) ++i;
                    i += 2;
                    var comment = css.slice(2, i - 2);
                    css = css.slice(i);
                    whitespace();
                    return { comment: comment };
                }
            }

            function selector() {
                var m = match(/^([^{]+)/);
                if (!m) return;
                var comment = m.input;
                comment = comment.match(/\}(.*?)\*\//);
                var selector = m[0].trim().split(/\s*,\s*/);
                return { selector: selector, comments: comment };
            }

            function declaration() {
                var prop = match(/^(\*?[-\w]+)\s*/);
                if (!prop) return;
                var comment = prop.input.match(/\/\*(.*?)\*\//);
                prop = prop[0];
                if (!match(/^:\s*/)) return;
                var val = match(/^((?:'(?:\\'|.)*?'|"(?:\\"|.)*?"|\([^\)]*?\)|[^};])+)\s*/);
                if (!val) return;
                val = val[0].trim();
                match(/^[;\s]*/);
                var full = prop + ": " + val + ";";
                return { property: prop, value: val, comments: comment, fullDec: full };
            }

            function keyframe() {
                var m, vals = [];
                while (m = match(/^(from|to|\d+%|\.\d+%|\d+\.\d+%)\s*/)) {
                    vals.push(m[1]);
                    match(/^,\s*/);
                }
                if (!vals.length) return;
                return { values: vals, declarations: declarations() };
            }

            function keyframes() {
                var m = match(/^@([-\w]+)?keyframes */);
                if (!m) return;
                var vendor = m[1];
                var m2 = match(/^([-\w]+)\s*/);
                if (!m2) return;
                var name = m2[1];
                if (!open()) return;
                comments();
                var frame, frames = [];
                while (frame = keyframe()) { frames.push(frame);
                    comments(); }
                if (!close()) return;
                return { name: name, vendor: vendor, keyframes: frames };
            }

            function media() {
                var m = match(/^@media *([^{]+)/);
                if (!m) return;
                var media = m[1].trim();
                if (!open()) return;
                comments();
                var style = rules();
                if (!close()) return;
                return { media: media, rules: style };
            }

            function fontface() {
                var m = match(/^@font-face\s*/);
                if (!m) return;
                if (!open()) return;
                comments();
                var decls = [];
                var decl;
                while (decl = declaration()) {
                    decls.push(decl);
                    comments();
                }
                if (!close()) return;
                return { fontface: true, declarations: decls };
            }

            function atimport() { return _atrule('import'); }

            function atcharset() { return _atrule('charset'); }

            function _atrule(name) {
                var m = match(new RegExp('^@' + name + ' *([^;\\n]+);\\s*'));
                if (!m) return;
                var ret = {};
                ret[name] = m[1].trim();
                return ret;
            }

            function declarations() {
                var decls = [];
                if (!open()) return;
                comments();
                var decl;
                while (decl = declaration()) { decls.push(decl);
                    comments(); }
                if (!close()) return;
                return decls;
            }

            function atrule() {
                return keyframes() || media() || fontface() || atimport() || atcharset();
            }

            function rule() {
                var sel = selector();
                if (!sel) return;
                comments();
                return { selectors: sel, declarations: declarations() };
            }

            return stylesheet();
        }

        // ================================================================
        // 2. CSS BEAUTIFY
        // ================================================================
        function cssbeautify(style, opt) {
            opt = opt || {};
            var indent = opt.indent || '\t';
            var openbrace = opt.openbrace === 'end-of-line';
            var autosemicolon = !!opt.autosemicolon;
            var index = 0,
                length = style.length,
                blocks = [],
                formatted = '',
                ch, ch2, str, state, depth = 0,
                quote = null,
                comment = false,
                State = { Start: 0, AtRule: 1, Block: 2, Selector: 3, Ruleset: 4, Property: 5, Separator: 6,
                    Expression: 7, URL: 8 };
            state = State.Start;

            function isWhitespace(c) { return c === ' ' || c === '\n' || c === '\t' || c === '\r' || c === '\f'; }

            function isQuote(c) { return c === "'" || c === '"'; }

            function isName(c) {
                return (c >= 'a' && c <= 'z') || (c >= 'A' && c <= 'Z') || (c >= '0' && c <= '9') || '-_*.:#'.indexOf(c) >= 0;
            }

            function trimRight(s) { return s.replace(/\s+$/, ''); }

            function appendIndent() { for (var i = depth; i > 0; i--) formatted += indent; }

            function openBlock() {
                formatted = trimRight(formatted);
                if (openbrace) formatted += ' {';
                else { formatted += '\n';
                    appendIndent();
                    formatted += '{'; }
                if (ch2 !== '\n') formatted += '\n';
                depth++;
            }

            function closeBlock() {
                depth--;
                formatted = trimRight(formatted);
                if (autosemicolon && formatted.charAt(formatted.length - 1) !== ';') formatted += ';';
                formatted += '\n';
                appendIndent();
                formatted += '}';
                blocks.push(formatted);
                formatted = '';
            }

            style = style.replace(/\r\n/g, '\n');

            while (index < length) {
                ch = style.charAt(index);
                ch2 = style.charAt(index + 1);
                index++;
                if (isQuote(quote)) {
                    formatted += ch;
                    if (ch === quote) quote = null;
                    if (ch === '\\' && ch2 === quote) { formatted += ch2;
                        index++; }
                    continue;
                }
                if (isQuote(ch)) { formatted += ch;
                    quote = ch; continue; }
                if (comment) {
                    formatted += ch;
                    if (ch === '*' && ch2 === '/') { comment = false;
                        formatted += ch2;
                        index++; }
                    continue;
                }
                if (ch === '/' && ch2 === '*') { comment = true;
                    formatted += ch;
                    formatted += ch2;
                    index++; continue; }

                if (state === State.Start) {
                    if (blocks.length === 0 && isWhitespace(ch) && formatted.length === 0) continue;
                    if (ch <= ' ' || ch.charCodeAt(0) >= 128) { state = State.Start;
                        formatted += ch; continue; }
                    if (isName(ch) || ch === '@') {
                        var str2 = trimRight(formatted);
                        if (str2.length === 0) { if (blocks.length > 0) formatted = '\n\n'; } else {
                            if (str2.charAt(str2.length - 1) === '}' || str2.charAt(str2.length - 1) === ';') {
                                formatted = str2 + '\n\n';
                            } else {
                                while (true) {
                                    var c2 = formatted.charAt(formatted.length - 1);
                                    if (c2 !== ' ' && c2.charCodeAt(0) !== 9) break;
                                    formatted = formatted.substr(0, formatted.length - 1);
                                }
                            }
                        }
                        formatted += ch;
                        state = (ch === '@') ? State.AtRule : State.Selector;
                        continue;
                    }
                }

                if (state === State.AtRule) {
                    if (ch === ';') { formatted += ch;
                        state = State.Start; continue; }
                    if (ch === '{') { openBlock();
                        state = State.Block; continue; }
                    formatted += ch;
                    continue;
                }

                if (state === State.Block) {
                    if (isName(ch)) {
                        var str3 = trimRight(formatted);
                        if (str3.length === 0) { if (blocks.length > 0) formatted = '\n\n'; } else {
                            if (str3.charAt(str3.length - 1) === '}') { formatted = str3 + '\n\n'; } else {
                                while (true) {
                                    var c3 = formatted.charAt(formatted.length - 1);
                                    if (c3 !== ' ' && c3.charCodeAt(0) !== 9) break;
                                    formatted = formatted.substr(0, formatted.length - 1);
                                }
                            }
                        }
                        appendIndent();
                        formatted += ch;
                        state = State.Selector;
                        continue;
                    }
                    if (ch === '}') { closeBlock();
                        state = State.Start; continue; }
                    formatted += ch;
                    continue;
                }

                if (state === State.Selector) {
                    if (ch === '{') { openBlock();
                        state = State.Ruleset; continue; }
                    if (ch === '}') { closeBlock();
                        state = State.Start; continue; }
                    formatted += ch;
                    continue;
                }

                if (state === State.Ruleset) {
                    if (ch === '}') { closeBlock();
                        state = State.Start; if (depth > 0) state = State.Block; continue; }
                    if (ch === '\n') { formatted = trimRight(formatted);
                        formatted += '\n'; continue; }
                    if (!isWhitespace(ch)) {
                        formatted = trimRight(formatted);
                        formatted += '\n';
                        appendIndent();
                        formatted += ch;
                        state = State.Property;
                        continue;
                    }
                    formatted += ch;
                    continue;
                }

                if (state === State.Property) {
                    if (ch === ':') { formatted = trimRight(formatted);
                        formatted += ': ';
                        state = State.Expression; if (isWhitespace(ch2)) state = State.Separator; continue; }
                    if (ch === '}') { closeBlock();
                        state = State.Start; if (depth > 0) state = State.Block; continue; }
                    formatted += ch;
                    continue;
                }

                if (state === State.Separator) {
                    if (!isWhitespace(ch)) { formatted += ch;
                        state = State.Expression; continue; }
                    if (isQuote(ch2)) state = State.Expression;
                    continue;
                }

                if (state === State.Expression) {
                    if (ch === '}') { closeBlock();
                        state = State.Start; if (depth > 0) state = State.Block; continue; }
                    if (ch === ';') { formatted = trimRight(formatted);
                        formatted += ';\n';
                        state = State.Ruleset; continue; }
                    formatted += ch;
                    if (ch === '(') {
                        if (formatted.charAt(formatted.length - 2) === 'l' &&
                            formatted.charAt(formatted.length - 3) === 'r' &&
                            formatted.charAt(formatted.length - 4) === 'u') {
                            state = State.URL;
                            continue;
                        }
                    }
                    continue;
                }

                if (state === State.URL) {
                    if (ch === ')' && formatted.charAt(formatted.length - 1) !== '\\') {
                        formatted += ch;
                        state = State.Expression;
                        continue;
                    }
                }
                formatted += ch;
            }

            formatted = blocks.join('') + formatted;
            return formatted;
        }

        // ================================================================
        // 3. SPLIT FUNCTIONS (progressive, each part sent via callback)
        // ================================================================

        // 3a. EVEN SPLIT – sends parts one by one
        function performSplitEven(css, sendPart) {
            var sheet = parseCSS(css);
            var allRules = sheet.stylesheet.rules;

            if (!allRules || allRules.length === 0) {
                for (var i = 0; i < 4; i++) sendPart(i, '');
                return;
            }

            function rulesToCSS(rules) {
                var result = '';
                for (var i = 0; i < rules.length; i++) {
                    var rule = rules[i];
                    if (rule.comment !== undefined) {
                        result += '/*' + rule.comment + '*/\r\n';
                    } else if (rule.selectors && rule.declarations) {
                        var selector = rule.selectors.selector || '';
                        result += selector + ' {';
                        for (var j = 0; j < rule.declarations.length; j++) {
                            result += rule.declarations[j].fullDec || '';
                        }
                        result += '}\r\n';
                    } else if (rule.media) {
                        result += '@media ' + rule.media + ' {';
                        if (rule.rules) {
                            for (var mi = 0; mi < rule.rules.length; mi++) {
                                var mr = rule.rules[mi];
                                if (mr.comment !== undefined) {
                                    result += '/*' + mr.comment + '*/\r\n';
                                } else if (mr.selectors && mr.declarations) {
                                    var sel = mr.selectors.selector || '';
                                    result += sel + ' {';
                                    for (var dj = 0; dj < mr.declarations.length; dj++) {
                                        result += mr.declarations[dj].fullDec || '';
                                    }
                                    result += '}';
                                }
                            }
                        }
                        result += '}\r\n';
                    } else if (rule.fontface) {
                        result += '@font-face {';
                        for (var fi = 0; fi < rule.declarations.length; fi++) {
                            result += rule.declarations[fi].fullDec || '';
                        }
                        result += '}\r\n';
                    } else if (rule.import) {
                        result += '@import ' + rule.import + ';\r\n';
                    } else if (rule.charset) {
                        result += '@charset ' + rule.charset + ';\r\n';
                    } else if (rule.name && rule.keyframes) {
                        result += '@' + (rule.vendor ? rule.vendor : '') + 'keyframes ' + rule.name + ' {';
                        for (var ki = 0; ki < rule.keyframes.length; ki++) {
                            var kf = rule.keyframes[ki];
                            result += kf.values.join(', ') + ' {';
                            for (var kd = 0; kd < kf.declarations.length; kd++) {
                                result += kf.declarations[kd].fullDec || '';
                            }
                            result += '}';
                        }
                        result += '}\r\n';
                    }
                }
                return result;
            }

            var total = allRules.length;
            var partSize = Math.ceil(total / 4);
            for (var i = 0; i < 4; i++) {
                var start = i * partSize;
                var end = Math.min(start + partSize, total);
                var chunk = allRules.slice(start, end);
                var cssText = rulesToCSS(chunk);
                var beautified = cssbeautify(cssText, { indent: '\t', openbrace: 'end-of-line', autosemicolon: false });
                // Remove zero units
                var units = ['px', 'em', 'ex', 'pt', '%', 'in', 'mm', 'cm', 'pc'];
                for (var u = 0; u < units.length; u++) {
                    beautified = beautified.replace(new RegExp(' 0' + units[u], 'g'), ' 0');
                    beautified = beautified.replace(new RegExp(':0' + units[u], 'g'), ':0');
                    beautified = beautified.replace(new RegExp('\\s0' + units[u], 'g'), ' 0');
                }
                sendPart(i, beautified);
            }
        }

        // 3b. PROPERTY SPLIT – sends each part as soon as it's ready
        function performSplitProperty(css, sendPart) {
            var layoutItems = [
                'margin', 'margin-left', 'margin-right', 'margin-top', 'margin-bottom',
                'padding', 'padding-left', 'padding-right', 'padding-top', 'padding-bottom',
                'float', 'display', 'visibility', 'width', 'max-width', 'min-width',
                'height', 'position', 'top', 'bottom', 'left', 'right',
                'text-align', 'text-indent', 'vertical-align', 'list-style-position',
                'clear', 'overflow', 'z-index', 'border-spacing', 'content'
            ];
            var fontItems = [
                'font', 'font-family', 'font-size', 'font-weight', 'font-style',
                'font-variant', 'font-stretch', 'line-height', 'letter-spacing',
                'word-spacing', 'text-transform', 'text-decoration',
                'text-decoration-line', 'text-decoration-style', 'text-decoration-color',
                'text-shadow', 'font-display'
            ];
            var colorItems = [
                'color', 'background-color', 'background', 'border-color', 'outline-color',
                'text-decoration-color', '-webkit-text-fill-color', 'fill', 'stroke'
            ];

            function arrayToObject(arr) {
                var o = {};
                for (var i = 0; i < arr.length; i++) o[arr[i]] = '';
                return o;
            }
            var layoutLookup = arrayToObject(layoutItems);
            var fontLookup = arrayToObject(fontItems);
            var colorLookup = arrayToObject(colorItems);

            var sheet = parseCSS(css);
            var rules = sheet.stylesheet.rules;

            // Build four separate builders
            var builders = [
                { name: 'layout', data: '' },
                { name: 'style', data: '' },
                { name: 'fonts', data: '' },
                { name: 'colors', data: '' }
            ];

            for (var i = 0; i < rules.length; i++) {
                var rule = rules[i];

                if (rule.hasOwnProperty('comment')) {
                    var prefix = (i !== 0) ? '\r\n\r\n' : '';
                    for (var b = 0; b < builders.length; b++) {
                        builders[b].data += prefix + '/*' + rule.comment + '*/\r\n';
                    }
                    continue;
                }

                if (rule.hasOwnProperty('fontface')) {
                    // Font-face goes to fonts (index 2)
                    var fontsPart = '@font-face {';
                    var decls = rule.declarations || [];
                    for (var fi = 0; fi < decls.length; fi++) {
                        fontsPart += decls[fi].fullDec || '';
                    }
                    fontsPart += '}\r\n';
                    builders[2].data += fontsPart;
                    continue;
                }

                if (rule.hasOwnProperty('media')) {
                    // Media queries: we need to split them per category
                    var mediaParts = ['', '', '', ''];
                    var mediaRules = rule.rules || [];
                    for (var mi = 0; mi < mediaRules.length; mi++) {
                        var mr = mediaRules[mi];
                        if (mr.hasOwnProperty('comment')) {
                            var cp = '\r\n\r\n\t/*' + mr.comment + '*/\r\n';
                            for (var mp = 0; mp < 4; mp++) mediaParts[mp] += cp;
                            continue;
                        }
                        var sel = (mr.selectors && mr.selectors.selector) || '';
                        var ruleParts = ['', '', '', ''];
                        var decls = mr.declarations || [];
                        for (var di = 0; di < decls.length; di++) {
                            var d = decls[di];
                            var prop = d.property || '';
                            if (prop in layoutLookup) {
                                ruleParts[0] += d.fullDec || '';
                            } else if (prop in fontLookup) {
                                ruleParts[2] += d.fullDec || '';
                            } else if (prop in colorLookup) {
                                ruleParts[3] += d.fullDec || '';
                            } else {
                                ruleParts[1] += d.fullDec || '';
                            }
                        }
                        for (var p = 0; p < 4; p++) {
                            if (ruleParts[p].length > 0) {
                                mediaParts[p] += sel + ' {' + ruleParts[p] + '}';
                            }
                        }
                    }
                    // Now add each media part to the respective builder
                    for (var mp2 = 0; mp2 < 4; mp2++) {
                        if (mediaParts[mp2].length > 0) {
                            builders[mp2].data += '@media ' + rule.media + ' {' + mediaParts[mp2] + '}\r\n';
                        }
                    }
                    continue;
                }

                if (!rule.selectors) continue;
                var selector = rule.selectors.selector || '';
                var ruleParts = ['', '', '', ''];
                var decls = rule.declarations || [];
                for (var j = 0; j < decls.length; j++) {
                    var dec = decls[j];
                    var prop = dec.property || '';
                    if (prop in layoutLookup) {
                        ruleParts[0] += dec.fullDec || '';
                    } else if (prop in fontLookup) {
                        ruleParts[2] += dec.fullDec || '';
                    } else if (prop in colorLookup) {
                        ruleParts[3] += dec.fullDec || '';
                    } else {
                        ruleParts[1] += dec.fullDec || '';
                    }
                }
                for (var p2 = 0; p2 < 4; p2++) {
                    if (ruleParts[p2].length > 0) {
                        builders[p2].data += selector + ' {' + ruleParts[p2] + '}\r\n';
                    }
                }
            }

            // Now process each builder's data, beautify, and send
            function removeZeroUnits(str) {
                var units = ['px', 'em', 'ex', 'pt', '%', 'in', 'mm', 'cm', 'pc'];
                for (var u = 0; u < units.length; u++) {
                    str = str.replace(new RegExp(' 0' + units[u], 'g'), ' 0');
                    str = str.replace(new RegExp(':0' + units[u], 'g'), ':0');
                    str = str.replace(new RegExp('\\s0' + units[u], 'g'), ' 0');
                }
                return str;
            }

            // Send each part one by one
            for (var idx = 0; idx < 4; idx++) {
                var raw = builders[idx].data;
                var beautified = cssbeautify(raw, { indent: '\t', openbrace: 'end-of-line', autosemicolon: false });
                beautified = removeZeroUnits(beautified);
                sendPart(idx, beautified);
            }
        }

        // ================================================================
        // 4. UI – PROGRESSIVE UPDATES
        // ================================================================
        (function() {
            'use strict';

            // DOM refs
            var textarea = document.getElementById('cssInput');

                document.getElementById('part1Name'),
                document.getElementById('part2Name'),
                document.getElementById('part3Name'),
                document.getElementById('part4Name')
            ];
            var partCounts = [
                document.getElementById('part1Count'),
                document.getElementById('part2Count'),
                document.getElementById('part3Count'),
                document.getElementById('part4Count')
            ];
            var partSizes = [

            var resetBtn = document.getElementById('resetBtn');
            var toggleBtn = document.getElementById('toggleModeBtn');
            var modeLabel = document.getElementById('modeLabel');
            var footerHint = document.getElementById('footerHint');

            var splitMode = 'even'; // 'even' or 'property'
            var defaultCSS = `/* comments ahoy! */
                    .hello {
                        margin: 0;
                        /* comment */
                        color: #333;
                        font-size: 16px;
                    }
                    /* even more comments */
                    .example {
                        padding: 10px 20px;
                        background: #f0f0f0;
                        border: 1px solid #ccc;
                        display: flex;
                        width: 100%;
                        position: relative;
                        font-family: 'Arial', sans-serif;
                        color: #222;
                    }
                    @font-face {
                        font-family: 'MyFont';
                        src: url('font.woff2');
                    }`;

            // utilities
            function formatSize(bytes) {
                if (bytes === 0) return '0 B';
                var k = 1024;
                var sizes = ['B', 'KB', 'MB'];
                var i = Math.floor(Math.log(bytes) / Math.log(k));
                var val = (bytes / Math.pow(k, i)).toFixed(i === 0 ? 0 : 1);
                return val + ' ' + sizes[i];
            }

            function getStringSize(str) {
                return new Blob([str]).size;
            }

            // ---- CodeMirror for input ----
            var editor = CodeMirror.fromTextArea(textarea, {
                mode: 'css',
                lineNumbers: true,
                matchBrackets: false,
                lineWrapping: true,
                tabSize: 4,
                theme: 'default',
                viewportMargin: Infinity,
            });

            function updateCharCount() {
                var val = editor.getValue();
                var size = getStringSize(val);
                charCount.textContent = val.length + ' chars · ' + formatSize(size);
            }
            editor.on('change', updateCharCount);
            updateCharCount();

            // ---- CodeMirror for outputs ----
            function initOutputEditor(element) {
                if (!element) return null;
                if (element.CodeMirror) return element.CodeMirror;
                var cm = CodeMirror(function(parent) {
                    while (element.firstChild) element.removeChild(element.firstChild);
                    element.appendChild(parent);
                }, {
                    mode: 'css',
                    lineNumbers: true,
                    matchBrackets: false,
                    lineWrapping: true,
                    tabSize: 4,
                    theme: 'default',
                    readOnly: true,
                    viewportMargin: Infinity,
                });
                element.CodeMirror = cm;
                return cm;
            }

            function setOutputValue(element, value) {
                if (!element) return;
                var cm = element.CodeMirror;
                if (!cm) {
                    cm = initOutputEditor(element);
                }
                if (cm) {
                    cm.setValue(value || '');
                    setTimeout(function() { cm.refresh(); }, 50);
                }
            }

            // ---- Toggle Mode ----
            toggleBtn.addEventListener('click', function() {
                if (splitMode === 'even') {
                    splitMode = 'property';
                    modeLabel.textContent = 'Property';
                    toggleBtn.classList.add('toggle-active');
                    footerHint.textContent = 'property‑based split · layout · style · fonts · colors';
                    document.querySelectorAll('.download-btn').forEach(function(btn) {
                        var target = btn.dataset.target;
                        if (target === 'part1Output') btn.dataset.filename = 'layout.css';
                        else if (target === 'part2Output') btn.dataset.filename = 'style.css';
                        else if (target === 'part3Output') btn.dataset.filename = 'fonts.css';
                        else if (target === 'part4Output') btn.dataset.filename = 'colors.css';
                    });
                    partNames[0].textContent = 'layout.css';
                    partNames[1].textContent = 'style.css';
                    partNames[2].textContent = 'fonts.css';
                    partNames[3].textContent = 'colors.css';
                } else {
                    splitMode = 'even';
                    modeLabel.textContent = 'Even';
                    toggleBtn.classList.remove('toggle-active');
                    footerHint.textContent = 'evenly split into 4 parts · showing progressively';
                    document.querySelectorAll('.download-btn').forEach(function(btn) {
                        var target = btn.dataset.target;
                        if (target === 'part1Output') btn.dataset.filename = 'part1.css';
                        else if (target === 'part2Output') btn.dataset.filename = 'part2.css';
                        else if (target === 'part3Output') btn.dataset.filename = 'part3.css';
                        else if (target === 'part4Output') btn.dataset.filename = 'part4.css';
                    });
                    partNames[0].textContent = 'part1.css';
                    partNames[1].textContent = 'part2.css';
                    partNames[2].textContent = 'part3.css';
                    partNames[3].textContent = 'part4.css';
                }
                if (editor.getValue().trim()) {
                    splitCSS();
                }
            });

            // ---- Web Worker (progressive with heartbeat) ----
            var worker;

            function initWorker() {
                var workerCode = `
                    ${parseCSS.toString()}
                    ${cssbeautify.toString()}
                    ${performSplitEven.toString()}
                    ${performSplitProperty.toString()}

                    self.onmessage = function(e) {
                        var css = e.data.css;
                        var mode = e.data.mode || 'even';
                        try {
                            // Send a heartbeat every 5 seconds to indicate progress
                            var heartbeatInterval = setInterval(function() {
                                self.postMessage({ type: 'processing' });
                            }, 5000);

                            // Define sendPart function to post messages
                            function sendPart(index, content) {
                                self.postMessage({ type: 'part', index: index, content: content });
                            }
                            if (mode === 'property') {
                                performSplitProperty(css, sendPart);
                            } else {
                                performSplitEven(css, sendPart);
                            }
                            clearInterval(heartbeatInterval);
                            self.postMessage({ type: 'done' });
                        } catch(err) {
                            self.postMessage({ type: 'error', error: err.message });
                        }
                    };
                `;
                var blob = new Blob([workerCode], { type: 'application/javascript' });
                var url = URL.createObjectURL(blob);
                worker = new Worker(url);
                worker.onerror = function(err) {
                    statusMsg.textContent = '❌ Worker error: ' + err.message;
                    splitBtn.disabled = false;
                    splitLabel.textContent = 'Split!';
                };
            }

            var partsReceived = 0;

            function splitCSS() {
                var css = editor.getValue();
                if (!css.trim()) {
                    statusMsg.textContent = '⚠️ empty input';
                    return;
                }

                // Reset
                partsReceived = 0;
                for (var i = 0; i < 4; i++) {
                    setOutputValue(partOutputs[i], '');
                    partCounts[i].textContent = '';
                    partSizes[i].textContent = '';
                    panels[i].classList.remove('arriving');
                }

                splitBtn.disabled = true;
                splitLabel.innerHTML = '<span class="spinner"></span>';
                statusMsg.textContent = 'splitting…';
                outputs.classList.remove('hidden');

                if (!worker) {
                    initWorker();
                }

                var listener = function(e) {
                    var data = e.data;
                    if (data.type === 'part') {
                        var idx = data.index;
                        var content = data.content || '';
                        setOutputValue(partOutputs[idx], content);
                        var lines = content ? content.split('\n').filter(function(l) { return l.trim(); })
                            .length : 0;
                        partCounts[idx].textContent = '(' + lines + ' lines)';
                        partSizes[idx].textContent = '· ' + formatSize(getStringSize(content));
                        panels[idx].classList.add('arriving');
                        setTimeout(function() { panels[idx].classList.remove('arriving'); }, 400);
                        partsReceived++;
                        statusMsg.textContent = '⚡ received part ' + (idx + 1);
                    } else if (data.type === 'processing') {
                        statusMsg.textContent = '⏳ still processing… (' + partsReceived + ' parts so far)';
                    } else if (data.type === 'done') {
                        splitBtn.disabled = false;
                        splitLabel.textContent = 'Split!';
                        statusMsg.textContent = '✓ done (' + partsReceived + ' parts)';
                        worker.removeEventListener('message', listener);
                    } else if (data.type === 'error') {
                        splitBtn.disabled = false;
                        splitLabel.textContent = 'Split!';
                        statusMsg.textContent = '❌ error: ' + data.error;
                        worker.removeEventListener('message', listener);
                    }
                };
                worker.addEventListener('message', listener);

                // Timeout: 2 minutes (120 seconds)
                var timeout = setTimeout(function() {
                    worker.removeEventListener('message', listener);
                    splitBtn.disabled = false;
                    splitLabel.textContent = 'Split!';
                    if (partsReceived === 0) {
                        statusMsg.textContent = '⚠️ worker timeout – no parts received';
                    } else {
                        statusMsg.textContent = '⚠️ worker timeout – but ' + partsReceived + ' parts were received';
                    }
                }, 120000);

                var originalListener = listener;
                listener = function(e) {
                    if (e.data.type === 'done' || e.data.type === 'error') {
                        clearTimeout(timeout);
                    }
                    originalListener(e);
                };
                worker.removeEventListener('message', originalListener);
                worker.addEventListener('message', listener);

                worker.postMessage({ css: css, mode: splitMode });
            }

            // ---- Copy ----
            document.querySelectorAll('.copy-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var targetId = this.dataset.target;
                    var el = document.getElementById(targetId);
                    if (!el) return;
                    var text = '';
                    if (el.CodeMirror) {
                        text = el.CodeMirror.getValue();
                    } else {
                        text = el.textContent || '';
                    }
                    if (!text.trim()) {
                        statusMsg.textContent = '⚠️ nothing to copy';
                        return;
                    }
                    navigator.clipboard.writeText(text).then(function() {
                        statusMsg.textContent = '✓ copied!';
                        setTimeout(function() { statusMsg.textContent = ''; }, 1500);
                    }).catch(function() {
                        var ta = document.createElement('textarea');
                        ta.value = text;
                        document.body.appendChild(ta);
                        ta.select();
                        document.execCommand('copy');
                        document.body.removeChild(ta);
                        statusMsg.textContent = '✓ copied!';
                        setTimeout(function() { statusMsg.textContent = ''; }, 1500);
                    });
                });
            });

            // ---- Download ----
            document.querySelectorAll('.download-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var targetId = this.dataset.target;
                    var filename = this.dataset.filename || 'part.css';
                    var el = document.getElementById(targetId);
                    if (!el) return;
                    var text = '';
                    if (el.CodeMirror) {
                        text = el.CodeMirror.getValue();
                    } else {
                        text = el.textContent || '';
                    }
                    if (!text.trim()) {
                        statusMsg.textContent = '⚠️ nothing to download';
                        return;
                    }
                    var blob = new Blob([text], { type: 'text/css' });
                    var url = URL.createObjectURL(blob);
                    var a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    statusMsg.textContent = '✓ downloaded ' + filename;
                    setTimeout(function() { statusMsg.textContent = ''; }, 1500);
                });
            });

            // ---- Upload ----
            uploadBtn.addEventListener('click', function() {
                fileInput.click();
            });
            fileInput.addEventListener('change', function(e) {
                var file = this.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function(ev) {
                    var content = ev.target.result;
                    editor.setValue(content);
                    updateCharCount();
                    statusMsg.textContent = '✓ loaded ' + file.name;
                    setTimeout(function() { statusMsg.textContent = ''; }, 1500);
                    outputs.classList.add('hidden');
                    clearOutputs();
                };
                reader.readAsText(file);
                this.value = '';
            });

            // ---- Paste ----
            pasteBtn.addEventListener('click', function() {
                if (!navigator.clipboard) {
                    statusMsg.textContent = '⚠️ clipboard not available';
                    return;
                }
                navigator.clipboard.readText().then(function(text) {
                    if (text) {
                        editor.setValue(text);
                        updateCharCount();
                        statusMsg.textContent = '✓ pasted from clipboard';
                        setTimeout(function() { statusMsg.textContent = ''; }, 1500);
                        outputs.classList.add('hidden');
                        clearOutputs();
                    } else {
                        statusMsg.textContent = '⚠️ clipboard empty';
                    }
                }).catch(function() {
                    statusMsg.textContent = '⚠️ cannot read clipboard';
                });
            });

            // ---- Clear ----
            function clearOutputs() {
                for (var i = 0; i < 4; i++) {
                    setOutputValue(partOutputs[i], '');
                    partCounts[i].textContent = '';
                    partSizes[i].textContent = '';
                    panels[i].classList.remove('arriving');
                }
                partsReceived = 0;
            }

            function clearAll() {
                editor.setValue('');
                updateCharCount();
                outputs.classList.add('hidden');
                clearOutputs();
                statusMsg.textContent = '✓ cleared';
                setTimeout(function() { statusMsg.textContent = ''; }, 1000);
            }

            clearBtn.addEventListener('click', function() {
                if (editor.getValue().trim() && !confirm('Clear input and outputs?')) return;
                clearAll();
            });

            // ---- Reset ----
            function resetToDefault() {
                editor.setValue(defaultCSS);
                updateCharCount();
                setTimeout(function() { splitCSS(); }, 100);
                statusMsg.textContent = '↺ reset to default';
                setTimeout(function() { statusMsg.textContent = ''; }, 1500);
            }

            resetBtn.addEventListener('click', function() {
                if (editor.getValue().trim() !== defaultCSS.trim() && !confirm('Reset to default CSS?')) return;
                resetToDefault();
            });

            // ---- Split button ----
            splitBtn.addEventListener('click', splitCSS);

            // Keyboard shortcut
            editor.getWrapperElement().addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    splitCSS();
                }
            });

            // ---- Auto-split on load ----
            setTimeout(function() { splitCSS(); }, 200);

        })();
    </script>

</body>
</html>
